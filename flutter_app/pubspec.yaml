name: azul_mobile
description: Azul AI Assistant - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  
  # Networking
  http: ^1.1.0
  path_provider: ^2.1.1
  
  # Audio
  record: ^5.0.4
  audioplayers: ^5.2.1
  permission_handler: ^11.0.1
  
  # State Management
  provider: ^6.1.1
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Background Services (opcional, para después)
  # workmanager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
